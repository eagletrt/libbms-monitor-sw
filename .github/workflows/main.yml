name: PlatformIO CI

on:
  push:
  pull_request:
    branches:
      - master
      - dev
    types:
      - closed

jobs:
  test:
    name: Unit Tests
    runs-on:
      group: ci-runners
      labels: Linux

    strategy:
      matrix:
        examples: [
          examples/ltc6811-1/open-wire-check.c,
          examples/ltc6811-1/read-voltages.c,
          examples/ltc6811-1/read-write-configuration.c
        ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run Unit Tests (or generate minimal .ini)
        run: |
          if [ ! -f "platformio.ini" ]; then
            printf "[env:latest_stable]\n" > platformio.ini
            printf "platform = native\n" >> platformio.ini
            printf "lib_deps = Unity, ./\n" >> platformio.ini
            printf "build_flags =\n" >> platformio.ini
            printf "    -DEAGLETRT_STATIC=\n" >> platformio.ini
            printf "    -DEAGLETRT_STATIC_INLINE=\n" >> platformio.ini
            echo "Created platformio.ini"
          fi
          pio test -e latest_stable

      - name: Run Example
        run: |
          pio ci -l . --exclude=src/test --exclude=src/examples -O "framework=stm32cube" ${{ matrix.examples }} -b nucleo_f446re

  check:
    name: Static Code Analysis
    runs-on:
      group: ci-runners
      labels: Linux
    # Run only when:
    #  - push to branch dev (e.g. merge commit pushed to dev), OR
    #  - pull_request event with action closed and merged == true targeting dev
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && github.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run Static Code Analysis
        run: |
          if [ ! -f "platformio.ini" ]; then
            printf "[env:latest_stable]\n" > platformio.ini
            printf "platform = native\n" >> platformio.ini
            printf "lib_deps = Unity, ./\n" >> platformio.ini
            echo "Created platformio.ini"
          fi
          pio check
